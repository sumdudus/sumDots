# https://wiki.hypr.land/Configuring/

# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto

source = ~/.config/hypr/hyprland/programs.conf
source = ~/.config/hypr/hyprland/autostart.conf
source = ~/.config/hypr/hyprland/envVariables.conf
source = ~/.config/hypr/hyprland/variables.conf
source = ~/.config/hypr/hyprland/input.conf
source = ~/.config/hypr/hyprland/keybinds.conf
source = ~/.config/hypr/hyprland/windowWorkspaceRules.conf
